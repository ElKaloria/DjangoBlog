services:
  db:
    image: postgres:14
    container_name: djangoblog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - postgres.env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U djangoblog -d djangoblog" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
    container_name: djangoblog_backend
    command: bash -c " python manage.py makemigrations && \
      python manage.py migrate && \
      python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./:/app
    env_file:
      - .env
      - postgres.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: